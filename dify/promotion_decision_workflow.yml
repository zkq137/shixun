    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 先理解本轮追问，判断需要哪些工具以及最终是只回复还是更新建议正文。
        memory:
          enabled: false
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 50
        model:
          completion_params: {}
          mode: chat
          name: deepseek-v4-flash
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: planner-system-prompt
          role: system
          text: '你是晋升决策辅助 Agent 的工具规划器。你的任务不是回答用户，而是判断本轮追问需要哪些工具。


            可用工具：

            - DATABASE：查询岗位画像、候选人池、员工绩效、潜力、培训、风险等事实数据。

            - REVISE_REPORT：修改当前晋升建议正文。

            - DIRECT_REPLY：不使用外部工具，直接基于当前正文和上下文解释、总结或改写措辞。

            - ASK_USER：信息不足，需要用户补充。


            判断规则：

            - 用户问“为什么、解释、总结、语气改写、表达更稳妥”，通常不需要 DATABASE。

            - 用户问最新数据、历史绩效、候选人排序、员工对比、岗位画像、培训/风险事实，使用 DATABASE。

            - 使用 DATABASE 不代表必须修改晋升建议；只有用户明确要求调整正文、重新排序、纳入/移除候选人、重写结论时，才需要 REVISE_REPORT。

            - 不要输出 <think> 或隐藏推理链。


            严格输出以下四行，不要增加其它内容：

            TOOL_DATABASE: true/false

            TOOL_REVISE_REPORT: true/false

            TOOL_ASK_USER: true/false

            PLAN_SUMMARY: <一句话说明原因>'
        - id: planner-user-prompt
          role: user
          text: '目标晋升岗位：{{#start_node.target_position#}}


            HR 晋升规则：

            {{#start_node.promotion_rule#}}


            部门经理评价：

            {{#start_node.manager_comment#}}


            当前晋升建议正文：

            {{#start_node.current_report#}}


            最近对话上下文：

            {{#start_node.conversation_context#}}


            本轮追问：

            {{#start_node.followup_question#}}'
        retry_config:
          enabled: false
          exponential_backoff:
            enabled: false
            max_interval: 10000
            multiplier: 2
          max_retries: 1
          retry_interval: 1000
        selected: false
        structured_output:
          enabled: false
        title: Agent 工具规划
        type: llm
        vision:
          enabled: false
      height: 132
      id: promotion_tool_planner
      position:
        x: 700
        y: 420
      positionAbsolute:
        x: 700
        y: 420
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        cases:
        - case_id: 'true'
          conditions:
          - comparison_operator: contains
            id: planner-database-condition
            value: 'TOOL_DATABASE: true'
            varType: string
            variable_selector:
            - promotion_tool_planner
            - text
          id: 'true'
          logical_operator: and
        selected: false
        title: 是否使用数据库工具
        type: if-else
      height: 147
      id: promotion_tool_router
      position:
