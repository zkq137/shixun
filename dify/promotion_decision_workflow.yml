app:
  description: 基于真实人才数据库的晋升决策辅助工作流。按候选人采集、标准配置、多候选人对比、建议生成、审核反馈的流程，读取岗位要求和候选人池，输出可解释晋升建议。
  icon: 📈
  icon_background: '#E0F2FE'
  icon_type: emoji
  mode: workflow
  name: 晋升决策辅助Agent
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/deepseek:0.0.19@5b68617c637b62d31e7f33a9f5677b76e88f81868fb04a728e208588564b72ea
    version: null
- current_identifier: null
  type: marketplace
