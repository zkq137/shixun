    - data:
        desc: 从 position_profile 读取目标岗位的职级、核心技能、培训、绩效和任职要求。
        isInIteration: false
        isInLoop: false
        is_team_authorization: true
        output_schema: null
        paramSchemas: []
        params:
          db_uri: ''
          format: ''
          query: ''
        provider_id: hjlarry/database/database
        provider_name: hjlarry/database/database
        provider_type: builtin
        selected: false
        title: 读取目标岗位要求
        tool_configurations:
          format:
            type: constant
            value: md
        tool_description: This tool is used to execute SQL in an existing database.
        tool_label: SQL Execute
        tool_name: sql_execute
        tool_node_version: '2'
        tool_parameters:
          db_uri:
            type: mixed
            value: ''
          query:
            type: mixed
            value: "SELECT position_name, department, job_level, rank_name, position_type,\n       core_skills, bonus_skills, required_training,\n       performance_requirement, tenure_requirement,\n       work_mode_requirement, is_manager, fit_description\nFROM position_profile\nWHERE position_name = '{{#start_node.target_position#}}'\nLIMIT 1;"
        type: tool
      height: 168
      id: position_profile_query
      position:
        x: 390
        y: 180
      positionAbsolute:
        x: 390
        y: 180
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 按目标岗位所属部门筛选绩效、潜力和风险达标的候选人池，并按优先级排序。
        isInIteration: false
        isInLoop: false
        is_team_authorization: true
        output_schema: null
        paramSchemas: []
        params:
          db_uri: ''
          format: ''
          query: ''
        provider_id: hjlarry/database/database
        provider_name: hjlarry/database/database
        provider_type: builtin
        selected: false
        title: 筛选候选人池
        tool_configurations:
          format:
            type: constant
            value: md
        tool_description: This tool is used to execute SQL in an existing database.
        tool_label: SQL Execute
        tool_name: sql_execute
        tool_node_version: '2'
        tool_parameters:
          db_uri:
            type: mixed
            value: ''
          query:
            type: mixed
            value: "SELECT e.employee_id, e.name, e.age, e.gender, e.department,\n       e.position_name, e.job_level, e.rank_name,\n       e.performance_score, e.tenure_years, e.base_salary,\n       e.compensation_factor, e.skill_tags, e.training_completed,\n       COALESCE(ep.potential_score, 0) AS potential_score,\n       COALESCE(ep.potential_level, '') AS potential_level,\n       e.attrition_risk_score, e.attrition_risk,\n       COALESCE(ep.talent_tag, e.talent_tag, '') AS talent_tag,\n       e.work_mode, e.manager_id\nFROM employee_talent_data e\nJOIN position_profile p ON p.position_name COLLATE utf8mb4_unicode_ci = '{{#start_node.target_position#}}' COLLATE utf8mb4_unicode_ci\nLEFT JOIN employee_potential ep ON ep.employee_id COLLATE utf8mb4_unicode_ci = e.employee_id COLLATE utf8mb4_unicode_ci\nWHERE e.department COLLATE utf8mb4_unicode_ci = p.department COLLATE utf8mb4_unicode_ci\n  AND e.performance_score >= 3\n  AND COALESCE(ep.potential_score, 0) >= 70\n  AND e.attrition_risk_score\
              \ <= 60\nORDER BY e.performance_score DESC,\n         COALESCE(ep.potential_score, 0) DESC,\n         e.attrition_risk_score ASC,\n         e.tenure_years DESC\nLIMIT 10;"
        type: tool
      height: 168
      id: candidate_pool_query
      position:
        x: 700
        y: 180
      positionAbsolute:
        x: 700
        y: 180
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        cases:
        - case_id: 'true'
          conditions:
          - comparison_operator: contains
            id: after-db-generate-condition
            value: generate
            varType: string
            variable_selector:
            - start_node
            - mode
          id: 'true'
          logical_operator: and
        selected: false
        title: 数据库后输出类型
        type: if-else
      height: 147
      id: promotion_after_db_router
      position:
        x: 1010
        y: 180
      positionAbsolute:
        x: 1010
        y: 180
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 不查询数据库，只基于当前建议正文、上下文和 planner 结果回答或修订。
        memory:
          enabled: false
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 50
        model:
          completion_params: {}
          mode: chat
          name: deepseek-v4-flash
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: chat-no-db-system-prompt
          role: system
          text: '你是企业人才梯队与晋升决策专家。当前是晋升建议生成后的追问讨论阶段。


            本节点不会查询数据库。你只能基于当前晋升建议正文、最近对话上下文、HR 规则、部门经理评价和 planner 的工具规划回答。


            要求：

            - 如果 planner 判断需要 ASK_USER，优先向用户提出一个清晰补充问题。

            - 不要编造当前建议正文和上下文里没有的员工数据、绩效、潜力、岗位画像或候选人信息。

            - 如果用户明确要求修改正文，并且不需要新事实数据，可以输出完整 UPDATED_REPORT。

            - 如果只是解释、总结、措辞优化建议，UPDATED_REPORT 留空。

            - 不要输出 <think>、隐藏推理链或内部思考过程。

            - 需要输出一段给用户看的可见思考摘要，只说明判断依据、是否用了工具、是否会修改正文，不展开隐藏推理链。

            - 严格输出 THINKING_SUMMARY、CHAT_REPLY 和 UPDATED_REPORT 三段。'
        - id: chat-no-db-user-prompt
          role: user
          text: 'Planner 结果：

            {{#promotion_tool_planner.text#}}


            目标晋升岗位：{{#start_node.target_position#}}

            发起人：{{#start_node.created_by#}}


            HR 晋升规则：

            {{#start_node.promotion_rule#}}


            部门经理评价：

            {{#start_node.manager_comment#}}


            当前晋升建议正文：

            {{#start_node.current_report#}}


            最近对话上下文：

            {{#start_node.conversation_context#}}


            本轮追问：

            {{#start_node.followup_question#}}


            输出格式：

            THINKING_SUMMARY:

            <给用户看的简短思考摘要，1-3 句，不输出隐藏推理链>

            CHAT_REPLY:

            <给用户的简短回复>

            UPDATED_REPORT:

            <如需更新则写完整更新后的晋升建议正文，否则留空>'
        retry_config:
          enabled: false
          exponential_backoff:
            enabled: false
            max_interval: 10000
            multiplier: 2
          max_retries: 1
          retry_interval: 1000
        selected: false
        structured_output:
          enabled: false
        title: 无工具追问回复
        type: llm
        vision:
          enabled: false
      height: 132
