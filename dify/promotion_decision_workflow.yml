    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 已按 planner 使用数据库工具；结合查询结果回答，但不强制生成新建议。
        memory:
          enabled: false
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 50
        model:
          completion_params: {}
          mode: chat
          name: deepseek-v4-flash
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: chat-db-system-prompt
          role: system
          text: '你是企业人才梯队与晋升决策专家。当前是晋升建议生成后的追问讨论阶段，本轮已经按 planner 使用数据库工具。


            要求：

            - 使用数据库结果回答用户的事实问题、候选人对比、岗位画像、绩效/潜力/风险/培训问题。

            - 查询数据库不等于必须更新晋升建议。只有 planner 的 TOOL_REVISE_REPORT 为 true，或用户明确要求修改正文、重新排序、纳入/移除候选人、重写结论时，才输出完整 UPDATED_REPORT。

            - 如果只是事实回答或解释，UPDATED_REPORT 留空。

            - 不要编造数据库和输入中没有的事实。

            - 不要输出 <think>、隐藏推理链或内部思考过程。

            - 需要输出一段给用户看的可见思考摘要，只说明判断依据、是否用了工具、是否会修改正文，不展开隐藏推理链。

            - 严格输出 THINKING_SUMMARY、CHAT_REPLY 和 UPDATED_REPORT 三段。'
        - id: chat-db-user-prompt
          role: user
          text: 'Planner 结果：

            {{#promotion_tool_planner.text#}}


            目标晋升岗位：{{#start_node.target_position#}}

            发起人：{{#start_node.created_by#}}


            HR 晋升规则：

            {{#start_node.promotion_rule#}}


