    - data:
        code: "import json\n\n\ndef safe_str(value, default=\"\"):\n    if value is\
          \ None:\n        return default\n    return str(value).strip()\n\n\ndef\
          \ safe_float(value, default=0.0):\n    try:\n        text = safe_str(value)\n\
          \        if text == \"\":\n            return default\n        return float(text)\n\
          \    except Exception:\n        return default\n\n\ndef parse_employee_profile(employee_profile):\n\
          \    raw = safe_str(employee_profile)\n    if raw == \"\":\n        return\
          \ {}\n\n    try:\n        data = json.loads(raw)\n        if isinstance(data,\
          \ dict):\n            return data\n        if isinstance(data, list) and\
          \ len(data) > 0 and isinstance(data[0], dict):\n            return data[0]\n\
          \    except Exception:\n        pass\n\n    return {\"原始输入\": raw}\n\n\n\
          def calc_risk_score(item):\n    existing_score = item.get(\"流失风险分\")\n \
          \   if safe_str(existing_score) != \"\":\n        return max(0, min(100,\
          \ round(safe_float(existing_score), 1)))\n\n    score = 30\n\n    performance\
          \ = safe_float(item.get(\"绩效评分\"))\n    years = safe_float(item.get(\"司龄(年)\"\
          ))\n    salary_ratio = safe_float(item.get(\"薪酬系数\"))\n    potential_level\
          \ = safe_str(item.get(\"潜力等级\"))\n    talent_tag = safe_str(item.get(\"\
          人才标签\"))\n    training = safe_str(item.get(\"已完成培训\"))\n    work_mode =\
          \ safe_str(item.get(\"办公方式\"))\n\n    if performance <= 2:\n        score\
          \ += 20\n    elif performance == 3:\n        score += 10\n    elif performance\
          \ >= 4:\n        score -= 5\n\n    if years < 1:\n        score += 10\n\
          \    elif years < 3:\n        score += 6\n    elif years > 8 and performance\
          \ <= 3:\n        score += 5\n\n    if salary_ratio < 0.85:\n        score\
          \ += 18\n    elif salary_ratio < 0.95:\n        score += 12\n    elif salary_ratio\
          \ < 1.0:\n        score += 6\n    elif salary_ratio >= 1.1:\n        score\
          \ -= 4\n\n    if \"C级\" in potential_level:\n        score += 8\n    elif\
          \ \"B级\" in potential_level:\n        score += 2\n    elif \"A级\" in potential_level:\n\
          \        score -= 2\n    elif \"S级\" in potential_level:\n        score\
          \ -= 4\n\n    if \"待优化\" in talent_tag:\n        score += 12\n    elif \"\
          储备人才\" in talent_tag:\n        score -= 2\n    elif \"核心骨干\" in talent_tag:\n\
          \        score -= 4\n\n    if training == \"\":\n        score += 8\n  \
          \  else:\n        dev_keywords = [\"领导力\", \"职业规划\", \"晋升\", \"项目管理\", \"\
          高效沟通\"]\n        if not any(keyword in training for keyword in dev_keywords):\n\
          \            score += 4\n\n    if \"远程\" in work_mode:\n        score +=\
          \ 3\n    elif \"混合\" in work_mode:\n        score += 1\n\n    return max(0,\
          \ min(100, round(score, 1)))\n\n\ndef calc_risk_level(item, risk_score):\n\
          \    existing_level = safe_str(item.get(\"流失风险\"))\n    if existing_level\
          \ != \"\":\n        return existing_level\n\n    if risk_score >= 70:\n\
          \        return \"高风险\"\n    if risk_score >= 40:\n        return \"中风险\"\
          \n    return \"低风险\"\n\n\ndef calc_priority_level(item, risk_level):\n \
          \   is_key_position = safe_str(item.get(\"是否关键岗位\")) == \"是\"\n    is_successor\
          \ = safe_str(item.get(\"是否继任候选\")) == \"是\"\n    talent_tag = safe_str(item.get(\"\
          人才标签\"))\n    potential_level = safe_str(item.get(\"潜力等级\"))\n\n    if risk_level\
          \ == \"高风险\":\n        return \"high\"\n    if risk_level == \"中风险\" and\
          \ (\n        is_key_position\n        or is_successor\n        or \"核心骨干\"\
          \ in talent_tag\n        or \"S级\" in potential_level\n    ):\n        return\
          \ \"high\"\n    return \"normal\"\n\n\ndef calc_risk_factors(item):\n  \
          \  factors = []\n\n    performance = safe_float(item.get(\"绩效评分\"))\n  \
          \  years = safe_float(item.get(\"司龄(年)\"))\n    salary_ratio = safe_float(item.get(\"\
          薪酬系数\"))\n    training = safe_str(item.get(\"已完成培训\"))\n    work_mode =\
          \ safe_str(item.get(\"办公方式\"))\n\n    if performance <= 2:\n        factors.append(\"\
          近期绩效偏低\")\n    if years < 3:\n        factors.append(\"司龄较短，稳定性仍需观察\")\n\
          \    if salary_ratio < 0.95:\n        factors.append(\"薪酬竞争力偏弱\")\n    if\
          \ training == \"\":\n        factors.append(\"培训发展支持不足\")\n    else:\n \
          \       dev_keywords = [\"领导力\", \"职业规划\", \"晋升\", \"项目管理\", \"高效沟通\"]\n\
          \        if not any(keyword in training for keyword in dev_keywords):\n\
          \            factors.append(\"发展型培训投入不足\")\n    if \"远程\" in work_mode:\n\
          \        factors.append(\"远程办公需额外关注归属感\")\n\n    if len(factors) == 0:\n\
          \        factors.append(\"当前未发现特别突出的显性风险因素\")\n\n    return \"、\".join(factors)\n\
          \n\ndef build_employee_profile(item):\n    return (\n        f\"姓名：{safe_str(item.get('姓名',\
          \ '未知'))}；\"\n        f\"工号：{safe_str(item.get('员工工号', '未知'))}；\"\n    \
          \    f\"部门：{safe_str(item.get('所属部门', '未知'))}；\"\n        f\"岗位：{safe_str(item.get('岗位名称',\
          \ '未知'))}；\"\n        f\"职级层级：{safe_str(item.get('职级层级', '未知'))}；\"\n  \
          \      f\"职级：{safe_str(item.get('职级', '未知'))}；\"\n        f\"人才标签：{safe_str(item.get('人才标签',\
          \ '未知'))}；\"\n        f\"潜力等级：{safe_str(item.get('潜力等级', '未知'))}\"\n   \
          \ )\n\n\ndef main(employee_input):\n    item = parse_employee_profile(employee_input)\n\
          \n    output_employee_profile = build_employee_profile(item)\n    risk_score\
          \ = calc_risk_score(item)\n    risk_level = calc_risk_level(item, risk_score)\n\
          \    priority_level = calc_priority_level(item, risk_level)\n    risk_factors\
          \ = calc_risk_factors(item)\n\n    name = safe_str(item.get(\"姓名\"), \"\
          该员工\")\n    risk_summary = (\n        f\"{name}当前风险等级为{risk_level}，风险分为{risk_score}，\"\
          \n        f\"干预优先级为{priority_level}。主要关注点：{risk_factors}。\"\n    )\n\n \
          \   intervention_context = (\n        f\"员工画像：{output_employee_profile}\\\
          n\"\n        f\"风险分：{risk_score}\\n\"\n        f\"风险等级：{risk_level}\\n\"\
          \n        f\"干预优先级：{priority_level}\\n\"\n        f\"主要风险因素：{risk_factors}\\\
          n\"\n        f\"是否关键岗位：{safe_str(item.get('是否关键岗位', '未知'))}\\n\"\n     \
          \   f\"是否继任候选：{safe_str(item.get('是否继任候选', '未知'))}\\n\"\n        f\"已完成培训：{safe_str(item.get('已完成培训',\
          \ '无'))}\"\n    )\n\n    return {\n        \"employee_profile\": output_employee_profile,\n\
          \        \"risk_score\": risk_score,\n        \"risk_level\": risk_level,\n\
          \        \"priority_level\": priority_level,\n        \"risk_factors\":\
          \ risk_factors,\n        \"risk_summary\": risk_summary,\n        \"intervention_context\"\
          : intervention_context,\n    }"
        code_language: python3
